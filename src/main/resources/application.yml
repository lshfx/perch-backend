spring:
  application:
    name: perch-backend
  main:
    allow-bean-definition-overriding: true

  # 数据源配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://127.0.0.1:9999/psy_counseling?currentSchema=public&sslmode=disable
    username: admin
    password: fx521891
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6380
      password: ${SERVER_REDIS_PWD}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  mail:
    host: smtp.qq.com
    username: 3538313283@qq.com
    password: nuwgyyuijkijdagc
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  # Spring AI 配置
  ai:
    model:
      chat: deepseek
      embedding: ollama
    # 1. DeepSeek 配置 (用于对话/推理)
    # 对应依赖: spring-ai-starter-model-deepseek
    deepseek:
      api-key: ${DEEPSEEK_API_KEY} # 请在环境变量设置 DEEPSEEK_API_KEY
      base-url: https://api.deepseek.com
      chat:
        enabled: true
        options:
          # 如果您想用推理模型(R1)，这里写 deepseek-reasoner
          # 如果是普通对话，写 deepseek-chat
          model: deepseek-chat
          temperature: 0.6 # 推理模型通常建议温度稍低

    # 2. Ollama 配置 (用于本地 Embedding)
    # 对应依赖: spring-ai-starter-ollama
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen3:0.6b   # 👈 填入你刚才测试通过的神仙小模型
          temperature: 0.1    # 👈 温度调低，让它做个无情的 JSON 提取机器
      embedding:
        options:
          model: bge-m3


    vectorstore:
      pgvector:
        # 自动初始化表结构 (生产环境建议 false，由 Flyway 管理)
        initialize-schema: true
        # 表名
        table-name: vector_store
        # [修正] 距离算法: 必须是 COSINE_DISTANCE
        distance-type: COSINE_DISTANCE
        # 索引类型: HNSW (推荐，性能优于 IVFFlat)
        index-type: HNSW
        # [关键] 维度: 必须匹配 bge-m3 的 1024 (OpenAI 是 1536)
        dimensions: 1024
        # 批处理大小
        max-document-batch-size: 10000
server:
  servlet:
    encoding:
      charset: UTF-8
      force: true
      force-response: true
      enabled: true

# JWT 配置
jwt:
  # JWT 密钥（生产环境建议使用环境变量或配置中心）
  secret: ${JWT_SECRET:perch-backend-jwt-secret-key-for-development-and-testing-please-change-in-production}
  # JWT 过期时间（毫秒）- 默认 15分钟
  expiration: ${JWT_EXPIRATION:90000000}
  # JWT 刷新令牌过期时间（毫秒）- 默认 1小时
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  # JWT Token 前缀
  token-prefix: Bearer
  # JWT Token 请求头名称
  header-name: Authorization

# 日志配置
logging:
  level:
    root: INFO
    com.perch: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data: DEBUG
    com.baomidou.mybatisplus: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# MyBatis Plus 配置
mybatis-plus:
  # mapper xml 文件位置
  mapper-locations: classpath:mapper/*.xml
  # 实体类扫描包路径
  type-aliases-package: com.perch.entity
  # 全局配置
  global-config:
    # 数据库配置
    db-config:
      # 主键类型：auto 自增，assign_id 雪花算法
      id-type: auto
      # 逻辑删除配置
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      # 字段填充策略
      insert-strategy: not_null
      update-strategy: not_null
    # 控制台 print mybatis-plus 的 LOGO
    banner: true
  # 配置类型转换器（驼峰命名转换）
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # 缓存配置
    cache-enabled: false
    # 延迟加载
    lazy-loading-enabled: false
    # 多结果集
    multiple-result-sets-enabled: true
    # 使用列别名
    use-column-label: true
    # 自动映射
    auto-mapping-behavior: partial
    # 自动映射未知列
    auto-mapping-unknown-column-behavior: warning
    # 主键生成器
    use-generated-keys: true
    # 执行器类型：simple batch reuse
    default-executor-type: simple
    # 设置超时时间
    default-statement-timeout: 25
    # 设置获取数据的策略
    default-fetch-size: 100
    # 是否将SQL语句中的数据库字段名转换为实体类属性名
    call-setters-on-nulls: false
    # 本地缓存机制
    local-cache-scope: session
    # 数据库类型
    jdbc-type-for-null: other
    # 日志实现
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

